<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Informática General I</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    p {
      color: #8b949e;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: #161b22;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    a {
      text-decoration: none;
      color: #58a6ff;
      font-weight: bold;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      font-size: 0.9em;
      color: #8b949e;
    }
  </style>
</head>
<body>

  <header>
    <h1>📚 Informática General I</h1>
    <p>Repositorio de clases y prácticas</p>
  </header>

  <div class="container">

    <div class="card">
      <h2>Clase 01</h2>
      <p>HTML y GitHub</p>
      <a href="CLASE 01 - HTML Y GITHUB - completado/index.html">
        Ver contenido →
      </a>
    </div>

    <div class="card">
      <h2>Clase 02</h2>
      <p>HTML + CSS</p>
      <a href="CLASE 02 - HTML + CSS/index.html">
        Ver contenido →
      </a>
    </div>

    <div class="card">
      <h2>Clase 03</h2>
      <p>HTML semántico</p>
      <a href="CLASE 03 - HTML SEMÁNTICO/index.html">
        Ver contenido →
      </a>
    </div>

  </div>

  <footer>
    <p>Hecho con 💻 y ganas de aprender</p>
  </footer>

</body>
</html>
